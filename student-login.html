<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login - AttendPro</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header i {
      font-size: 3rem;
      color: #667eea;
      margin-bottom: 16px;
    }

    .login-header h2 {
      color: #333;
      margin-bottom: 8px;
    }

    .login-header p {
      color: #666;
      font-size: 0.9rem;
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s;
    }

    .input-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <i class="fa-solid fa-user-graduate"></i>
        <h2>Student Login</h2>
        <p>View your attendance records</p>
      </div>

      <div class="input-group">
        <label>Roll Number</label>
        <input type="text" id="studentRoll" placeholder="Enter your roll number" autocomplete="off" />
      </div>

      <button class="login-btn" onclick="studentLogin()" id="loginBtn">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Access Dashboard
      </button>

      <a href="index.html" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>

  <script>
    // Override studentLogin to show loading
    const originalStudentLogin = studentLogin;
    window.studentLogin = async function () {
      const btn = document.getElementById("loginBtn");
      const originalHtml = btn.innerHTML;

      btn.innerHTML = '<span class="loading"></span> Loading...';
      btn.disabled = true;

      // Make sure students are loaded
      if (window.students.length === 0) {
        await window.loadStudentsFromCloud();
      }

      // Call original function
      await originalStudentLogin();

      btn.innerHTML = originalHtml;
      btn.disabled = false;
    };
  </script>
  <!-- Your Main JavaScript -->
  <script src="js/students.js"></script>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>

</body>

</html>
