<!DOCTYPE html>
<html>
<head><title>Student Dashboard - AttendPro</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"></head>
<body style="background: linear-gradient(135deg, #667eea, #764ba2);">
    <div style="max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 16px;">
        <h2><i class="fa-solid fa-user-graduate"></i> Student Dashboard</h2>
        <p>Welcome, <span id="studentName"></span> (Roll: <span id="studentRoll"></span>)</p>
        <div class="card">
            <h3>Subject-wise Attendance</h3>
            <canvas id="subjectChart" style="max-height:300px;"></canvas>
        </div>
        <div class="card">
            <h3>Detailed Records</h3>
            <div id="attendanceDetails"></div>
        </div>
        <button onclick="logout()" class="btn-danger">Logout</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/student_dash.js"></script>
</body>
</html>
