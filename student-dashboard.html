<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - AttendPro</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div style="max-width: 800px; margin: 40px auto; padding: 20px;">
        <!-- Student Profile Card -->
        <div class="card" style="text-align: center; margin-bottom: 24px;">
            <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #4361ee, #3a56d4); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                <i class="fa-solid fa-user-graduate" style="font-size: 40px; color: white;"></i>
            </div>
            <h2 id="studentName">Loading...</h2>
            <p style="color: #666;">Roll Number: <strong id="studentRoll">-</strong></p>
        </div>

        <!-- Stats Cards -->
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 24px;">
            <div class="scard total" style="text-align: center;">
                <i class="fa-solid fa-calendar-week icon"></i>
                <h3>Total Classes</h3>
                <p id="studentTotal">0</p>
            </div>
            <div class="scard present" style="text-align: center;">
                <i class="fa-solid fa-user-check icon"></i>
                <h3>Present</h3>
                <p id="studentPresent">0</p>
            </div>
            <div class="scard absent" style="text-align: center;">
                <i class="fa-solid fa-user-xmark icon"></i>
                <h3>Absent</h3>
                <p id="studentAbsent">0</p>
            </div>
        </div>

        <!-- Attendance Chart -->
        <div class="card" style="margin-bottom: 24px;">
            <h3 style="text-align: center;"><i class="fa-solid fa-chart-pie"></i> Your Attendance Overview</h3>
            <canvas id="studentChart" style="max-height: 300px;"></canvas>
            <div style="text-align: center; margin-top: 16px;">
                <h2 style="color: #2ecc71;" id="studentPercent">0%</h2>
                <p>Overall Attendance Rate</p>
            </div>
        </div>

        <!-- Attendance History -->
        <div class="card">
            <h3><i class="fa-solid fa-history"></i> Attendance History</h3>
            <div id="studentAttendance" style="overflow-x: auto;"></div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <button onclick="logout()" style="background: #e74c3c;">
                <i class="fa-solid fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <script src="js/student-dashboard.js"></script>
</body>

</html>
