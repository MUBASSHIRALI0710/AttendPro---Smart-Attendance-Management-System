<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AttendPro - Smart Attendance System</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .landing-container {
            text-align: center;
            padding: 40px;
        }

        .logo {
            font-size: 4rem;
            color: white;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .tagline {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 48px;
        }

        .login-options {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .login-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .login-card i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .login-card h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #333;
        }

        .login-card p {
            color: #666;
            font-size: 0.9rem;
        }

        .login-card .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 500;
            transition: opacity 0.3s;
        }

        .login-card .btn:hover {
            opacity: 0.9;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 2rem;
            }

            .login-card {
                width: 260px;
                padding: 30px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="landing-container">
        <div class="logo">
            <i class="fa-solid fa-user-check"></i>
        </div>
        <h1>AttendPro</h1>
        <p class="tagline">Smart Attendance Management System</p>

        <div class="login-options">
            <div class="login-card" onclick="window.location.href='teacher-login.html'">
                <i class="fa-solid fa-chalkboard-user"></i>
                <h3>Teacher Portal</h3>
                <p>Mark attendance, manage students, and generate reports</p>
                <span class="btn">Login as Teacher</span>
            </div>

            <div class="login-card" onclick="window.location.href='student-login.html'">
                <i class="fa-solid fa-user-graduate"></i>
                <h3>Student Portal</h3>
                <p>View your attendance record and performance</p>
                <span class="btn">Login as Student</span>
            </div>
        </div>
    </div>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/students.js"></script>
</body>

</html>
