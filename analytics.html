<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics - AttendPro</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .analytics-container {
      padding: 20px 32px;
    }

    .chart-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .chart-card h3 {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-top: 16px;
    }

    /* Heatmap Container - Smaller Size */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(15, minmax(45px, 55px));
      gap: 6px;
      margin-top: 16px;
      justify-content: center;
    }

    .heatmap-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 10px;
      background: #f0f0f0;
      transition: transform 0.2s;
      cursor: pointer;
      padding: 4px;
    }

    .heatmap-day:hover {
      transform: scale(1.05);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .heatmap-day.present {
      background: #2ecc71;
      color: white;
    }

    .heatmap-day.absent {
      background: #e74c3c;
      color: white;
    }

    .heatmap-day.late {
      background: #f39c12;
      color: white;
    }

    .heatmap-day.no-data {
      background: #ecf0f1;
      color: #95a5a6;
    }

    .heatmap-date {
      font-size: 9px;
      font-weight: bold;
    }

    .heatmap-status {
      font-size: 7px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* Heatmap wrapper with scroll for small screens */
    .heatmap-wrapper {
      overflow-x: auto;
      margin-top: 16px;
    }

    .heatmap-legend {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
      flex-wrap: wrap;
      font-size: 12px;
    }

    .heatmap-legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .heatmap-legend span span {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    .prediction-alert {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 12px;
      border-radius: 8px;
      margin-top: 16px;
    }

    .prediction-alert.warning {
      background: #f8d7da;
      border-left-color: #dc3545;
    }

    .student-selector {
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .student-selector select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .trend-controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .btn-outline {
      background: white;
      border: 1px solid #4361ee;
      color: #4361ee;
    }

    .btn-outline:hover {
      background: #4361ee;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <h2><i class="fa-solid fa-user-check"></i> AttendPro</h2>
      <ul>
        <li><a href="dashboard.html"><i class="fa-solid fa-chart-line"></i><span>Dashboard</span></a></li>
        <li><a href="students.html"><i class="fa-solid fa-users"></i><span>Students</span></a></li>
        <li><a href="attendance.html"><i class="fa-solid fa-calendar-check"></i><span>Attendance</span></a></li>
        <li><a href="reports.html"><i class="fa-solid fa-chart-pie"></i><span>Reports</span></a></li>
        <li class="active"><a href="analytics.html"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a>
        </li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="main">
      <div class="navbar">
        <h3><i class="fa-solid fa-chart-line"></i> Advanced Analytics</h3>
        <div class="user" onclick="logout()"><i class="fa-solid fa-user-circle"></i><span>Admin</span></div>
      </div>

      <div class="analytics-container">
        <!-- Student Selector (for individual trend & heatmap) -->
        <div class="chart-card">
          <h3><i class="fa-solid fa-user-graduate"></i> Select Student</h3>
          <div class="student-selector">
            <label>View data for:</label>
            <select id="studentSelect" onchange="refreshAnalytics()">
              <option value="all">📊 Whole Class (Overall)</option>
            </select>
            <span id="selectedStudentName"></span>
          </div>
        </div>

        <!-- Trend Chart with toggle -->
        <div class="chart-card">
          <h3><i class="fa-solid fa-chart-line"></i> Attendance Trend
            <button class="btn-outline" style="margin-left: auto; padding: 4px 12px;"
              onclick="toggleTrendPeriod()">Switch to Weekly</button>
          </h3>
          <canvas id="trendChart" style="max-height: 300px;"></canvas>
          <div id="predictionAlert" class="prediction-alert" style="display: none;"></div>
        </div>

        <!-- Attendance Heatmap (Calendar) -->
        <div class="chart-card">
          <h3><i class="fa-solid fa-calendar-alt"></i> Attendance Heatmap (Last 90 days)</h3>
          <div class="heatmap-wrapper">
            <div id="heatmapContainer" class="heatmap-grid"></div>
          </div>
          <div class="heatmap-legend" style="display: flex; gap: 16px; margin-top: 16px; justify-content: center;">
            <span><span
                style="background:#2ecc71; display:inline-block; width:16px; height:16px; border-radius:4px;"></span>
              Present</span>
            <span><span
                style="background:#e74c3c; display:inline-block; width:16px; height:16px; border-radius:4px;"></span>
              Absent</span>
            <span><span
                style="background:#f39c12; display:inline-block; width:16px; height:16px; border-radius:4px;"></span>
              Late</span>
            <span><span
                style="background:#ecf0f1; display:inline-block; width:16px; height:16px; border-radius:4px;"></span> No
              Data</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/students.js"></script>
  <script src="js/analytics.js"></script>
</body>

</html>
